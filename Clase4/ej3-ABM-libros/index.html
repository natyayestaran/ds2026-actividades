<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ABM de libros</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    label {
      display: block;
      margin-top: 10px;
    }
    input[type="text"],
    input[type="number"] {
      width: 100%;
      max-width: 320px;
      padding: 6px;
      margin-top: 4px;
    }
    button {
      margin-top: 10px;
      margin-right: 8px;
    }
    #errorForm {
      color: red;
      margin-top: 10px;
    }
    ul {
      margin-top: 16px;
      padding-left: 20px;
    }
    .book-item {
      margin-bottom: 8px;
    }
    .book-item button {
      margin-left: 12px;
    }
    #stats {
      margin-top: 12px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>Catálogo</h1>

  <section>
    <label for="filtroAutor">Autor:</label>
    <input type="text" id="filtroAutor" placeholder="Buscar por autor">
    <button id="filtrar">Filtrar</button>
    <button id="mostrarDisponibles">Solo disponibles</button>
    <button id="mostrarTodos">Ver todos</button>
  </section>

  <section>
    <h2>Agregar libro</h2>
    <label for="titulo">Título:</label>
    <input type="text" id="titulo">

    <label for="autor">Autor:</label>
    <input type="text" id="autor">

    <label for="precio">Precio:</label>
    <input type="number" id="precio" min="0" step="0.01">

    <label>
      <input type="checkbox" id="disponible">
      Disponible
    </label>

    <label for="genero">Género (opcional):</label>
    <input type="text" id="genero">

    <button id="agregarLibro" type="button">Agregar</button>
    <div id="errorForm"></div>
  </section>

  <ul id="listado"></ul>
  <p id="stats"></p>

  <script src="app.js"></script>
</body>
</html>
