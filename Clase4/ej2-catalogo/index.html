<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    button {
      margin-right: 8px;
    }
    ul {
      margin-top: 16px;
      padding-left: 20px;
    }
    #stats {
      margin-top: 12px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>Catálogo</h1>
  <label for="filtroAutor">Autor:</label>
  <input type="text" id="filtroAutor" placeholder="Buscar por autor">
  <button id="filtrar">Filtrar</button>
  <button id="mostrarDisponibles">Solo disponibles</button>
  <button id="mostrarTodos">Ver todos</button>

  <ul id="listado"></ul>
  <p id="stats"></p>

  <script src="app.js"></script>
</body>
</html>
